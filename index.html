<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>MintChart</title>

  <!-- PWA -->
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#080810" />
  <meta name="mobile-web-app-capable" content="yes" />

  <!-- iOS PWA -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="MintChart" />
  <link rel="apple-touch-icon" href="icon-192.png" />

  <!-- Libraries -->
  <script src="https://unpkg.com/lightweight-charts@5.1.0/dist/lightweight-charts.standalone.production.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    /* ===== DESIGN TOKENS ===== */
    :root {
      --bg-dark: #080810;
      --bg-panel: #0d0d16;
      --bg-card: #12121e;
      --border-color: #1e2435;
      --border-bright: #2a3045;
      --text-main: #c3c6ce;
      --text-dim: #5a6272;
      --accent-color: #00e676;
      --accent-dim: rgba(0, 230, 118, 0.12);
      --danger-color: #ff5252;
      --warn-color: #FFC107;
      --topbar-h: 52px;
      --sidebar-w: 48px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 0;
      background: var(--bg-dark);
      color: var(--text-main);
      font-family: 'Outfit', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* ===== LOADING SCREEN ===== */
    #loading-screen {
      position: fixed;
      inset: 0;
      background: var(--bg-dark);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      transition: opacity 0.4s ease, visibility 0.4s ease;
    }

    #loading-screen.hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .loading-logo {
      width: 56px;
      height: 56px;
      background: linear-gradient(135deg, #00e676, #00b0ff);
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      font-weight: 700;
      color: #000;
      margin-bottom: 24px;
      box-shadow: 0 0 40px rgba(0, 230, 118, 0.3);
      animation: logo-pulse 2s ease-in-out infinite;
    }

    @keyframes logo-pulse {

      0%,
      100% {
        box-shadow: 0 0 30px rgba(0, 230, 118, 0.3);
      }

      50% {
        box-shadow: 0 0 60px rgba(0, 230, 118, 0.6);
      }
    }

    .loading-title {
      font-size: 20px;
      font-weight: 700;
      background: linear-gradient(90deg, #00e676, #00b0ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 32px;
      letter-spacing: -0.5px;
    }

    .loading-bar-wrap {
      width: 200px;
      height: 3px;
      background: rgba(255, 255, 255, 0.06);
      border-radius: 2px;
      overflow: hidden;
      margin-bottom: 16px;
    }

    .loading-bar {
      height: 100%;
      background: linear-gradient(90deg, #00e676, #00b0ff);
      border-radius: 2px;
      animation: loading-slide 1.4s ease-in-out infinite;
      width: 40%;
    }

    @keyframes loading-slide {
      0% {
        transform: translateX(-100%);
      }

      100% {
        transform: translateX(350%);
      }
    }

    .loading-text {
      font-size: 12px;
      color: var(--text-dim);
      letter-spacing: 0.5px;
    }

    /* ===== TOPBAR ===== */
    #topbar {
      height: var(--topbar-h);
      display: flex;
      align-items: center;
      padding: 0 14px;
      gap: 10px;
      background: linear-gradient(180deg, #0f0f1a 0%, #0b0b14 100%);
      border-bottom: 1px solid var(--border-color);
      box-shadow: 0 1px 0 rgba(255, 255, 255, 0.03), 0 4px 24px rgba(0, 0, 0, 0.5);
      position: relative;
      z-index: 100;
      user-select: none;
    }

    /* Brand */
    .tb-brand {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
      padding-right: 10px;
      border-right: 1px solid var(--border-color);
    }

    .tb-brand-icon {
      width: 28px;
      height: 28px;
      background: linear-gradient(135deg, #00e676, #00b0ff);
      border-radius: 7px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: 700;
      color: #000;
      letter-spacing: -1px;
      flex-shrink: 0;
    }

    .tb-brand-name {
      font-size: 14px;
      font-weight: 600;
      background: linear-gradient(90deg, #00e676, #00b0ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -0.3px;
    }

    /* Symbol block */
    .tb-symbol-block {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }

    #symbol-search-wrapper {
      position: relative;
    }

    #symbol-input {
      width: 156px;
      height: 34px;
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      color: #fff;
      font-family: inherit;
      font-size: 13px;
      font-weight: 600;
      padding: 0 10px 0 32px;
      outline: none;
      letter-spacing: 0.6px;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    #symbol-input:focus {
      border-color: var(--accent-color);
      box-shadow: 0 0 0 2px rgba(0, 230, 118, 0.12);
    }

    #symbol-input::placeholder {
      color: #3a4255;
      font-weight: 400;
      letter-spacing: 0;
    }

    .sym-search-icon {
      position: absolute;
      left: 10px;
      top: 50%;
      transform: translateY(-50%);
      color: #3a4255;
      font-size: 13px;
      pointer-events: none;
    }

    /* Dropdown */
    #symbol-dropdown {
      position: absolute;
      top: calc(100% + 8px);
      left: 0;
      width: 260px;
      background: #0e0e1c;
      border: 1px solid var(--border-color);
      border-radius: 10px;
      box-shadow: 0 16px 48px rgba(0, 0, 0, 0.8);
      z-index: 300;
      max-height: 360px;
      overflow-y: auto;
      display: none;
    }

    #symbol-dropdown.open {
      display: block;
      animation: fadeSlideIn 0.12s ease;
    }

    #symbol-dropdown::-webkit-scrollbar {
      width: 4px;
    }

    #symbol-dropdown::-webkit-scrollbar-track {
      background: transparent;
    }

    #symbol-dropdown::-webkit-scrollbar-thumb {
      background: #1e2435;
      border-radius: 2px;
    }

    .sym-group-label {
      padding: 10px 14px 4px;
      font-size: 10px;
      letter-spacing: 1.2px;
      text-transform: uppercase;
      color: #3a4255;
      font-weight: 700;
    }

    .sym-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 9px 14px;
      cursor: pointer;
      transition: background 0.12s;
      font-size: 13px;
      color: var(--text-main);
    }

    .sym-item:hover {
      background: rgba(0, 230, 118, 0.07);
      color: #fff;
    }

    .sym-item .sym-name {
      font-weight: 600;
      letter-spacing: 0.3px;
    }

    .sym-badge {
      font-size: 9px;
      padding: 2px 5px;
      border-radius: 3px;
      font-weight: 700;
      letter-spacing: 0.5px;
      background: rgba(255, 193, 7, 0.15);
      color: var(--warn-color);
    }

    /* Interval pills */
    .tb-intervals {
      display: flex;
      gap: 2px;
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      padding: 3px;
      flex-shrink: 0;
    }

    .iv-btn {
      height: 26px;
      padding: 0 9px;
      border: none;
      border-radius: 5px;
      background: transparent;
      color: var(--text-dim);
      font-family: inherit;
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
    }

    .iv-btn:hover {
      color: var(--text-main);
      background: rgba(255, 255, 255, 0.05);
    }

    .iv-btn.active {
      background: var(--accent-dim);
      color: var(--accent-color);
    }

    /* Live price ticker */
    #price-ticker {
      display: flex;
      align-items: baseline;
      gap: 5px;
      flex-shrink: 0;
      padding: 0 12px;
      border-left: 1px solid var(--border-color);
      border-right: 1px solid var(--border-color);
    }

    #ticker-price {
      font-size: 18px;
      font-weight: 700;
      color: #fff;
      letter-spacing: -0.5px;
      transition: color 0.3s;
    }

    #ticker-price.tick-up {
      color: var(--accent-color);
    }

    #ticker-price.tick-down {
      color: var(--danger-color);
    }

    #ticker-change {
      font-size: 11px;
      font-weight: 600;
      padding: 2px 6px;
      border-radius: 4px;
    }

    #ticker-change.up {
      background: rgba(0, 230, 118, 0.12);
      color: var(--accent-color);
    }

    #ticker-change.down {
      background: rgba(255, 82, 82, 0.12);
      color: var(--danger-color);
    }

    /* Status */
    #status {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      font-size: 12px;
      color: var(--text-dim);
    }

    .status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--accent-color);
      animation: pulse-dot 2s infinite;
    }

    @keyframes pulse-dot {

      0%,
      100% {
        opacity: 1;
        transform: scale(1);
      }

      50% {
        opacity: 0.4;
        transform: scale(0.7);
      }
    }

    .status-loading-spin {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      border: 2px solid rgba(255, 193, 7, 0.2);
      border-top-color: var(--warn-color);
      animation: spin 0.7s linear infinite;
      flex-shrink: 0;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    #status .sym-tag {
      font-weight: 600;
      color: var(--text-main);
    }

    #status .intv-tag {
      color: var(--text-dim);
    }

    #status .bars-tag {
      color: #3a4255;
    }

    /* Icon buttons row */
    .tb-actions {
      display: flex;
      gap: 6px;
      flex-shrink: 0;
    }

    .tb-btn {
      width: 34px;
      height: 34px;
      border: 1px solid var(--border-color);
      border-radius: 8px;
      background: var(--bg-card);
      color: var(--text-dim);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 15px;
      transition: all 0.15s;
      flex-shrink: 0;
    }

    .tb-btn:hover {
      background: rgba(255, 255, 255, 0.05);
      color: var(--text-main);
      border-color: var(--border-bright);
    }

    .tb-btn.active {
      background: var(--accent-dim);
      color: var(--accent-color);
      border-color: rgba(0, 230, 118, 0.3);
    }

    .tb-btn.danger-active {
      background: rgba(255, 82, 82, 0.1);
      color: var(--danger-color);
      border-color: rgba(255, 82, 82, 0.3);
    }

    /* ===== LEFT SIDEBAR (Drawing Tools) ===== */
    #draw-sidebar {
      position: relative;
      width: var(--sidebar-w);
      height: calc(100vh - var(--topbar-h));
      background: linear-gradient(180deg, #0d0d18 0%, #090912 100%);
      border-right: 1px solid var(--border-color);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 8px 0;
      gap: 4px;
      z-index: 50;
      flex-shrink: 0;
      overflow: visible;
    }

    body.fullscreen #draw-sidebar {
      height: 100vh;
    }

    .sidebar-divider {
      width: 28px;
      height: 1px;
      background: var(--border-color);
      margin: 4px 0;
    }

    .sidebar-btn {
      width: 36px;
      height: 36px;
      border-radius: 9px;
      border: 1px solid transparent;
      background: transparent;
      color: var(--text-dim);
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2px;
      font-size: 17px;
      transition: all 0.15s;
      position: relative;
      -webkit-tap-highlight-color: transparent;
    }

    .sidebar-btn:hover {
      background: rgba(255, 255, 255, 0.06);
      color: var(--text-main);
      border-color: var(--border-bright);
    }

    .sidebar-btn.active {
      background: var(--accent-dim);
      color: var(--accent-color);
      border-color: rgba(0, 230, 118, 0.35);
    }

    .sidebar-btn.active-danger {
      background: rgba(255, 82, 82, 0.1);
      color: var(--danger-color);
      border-color: rgba(255, 82, 82, 0.3);
    }

    /* Tooltip */
    .sidebar-btn::after {
      content: attr(data-tip);
      position: absolute;
      left: calc(100% + 10px);
      top: 50%;
      transform: translateY(-50%);
      background: #1a1f30;
      color: #fff;
      font-size: 11px;
      font-weight: 500;
      padding: 4px 8px;
      border-radius: 5px;
      white-space: nowrap;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.15s;
      border: 1px solid var(--border-color);
      font-family: 'Outfit', sans-serif;
      z-index: 500;
    }

    .sidebar-btn:hover::after {
      opacity: 1;
    }

    /* Touch hint for draw modes */
    .draw-hint {
      position: fixed;
      bottom: 20px;
      left: calc(var(--sidebar-w) + 12px);
      background: rgba(0, 0, 0, 0.85);
      color: var(--text-main);
      font-size: 12px;
      padding: 8px 14px;
      border-radius: 8px;
      border: 1px solid var(--border-color);
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.3s;
      z-index: 200;
      backdrop-filter: blur(8px);
    }

    .draw-hint.visible {
      opacity: 1;
    }

    /* ===== FLOATING PANEL BASE ===== */
    .float-panel {
      position: fixed;
      background: #0e0e1c;
      border: 1px solid var(--border-color);
      border-radius: 12px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8), inset 0 1px 0 rgba(255, 255, 255, 0.04);
      z-index: 250;
      display: none;
    }

    .float-panel.open {
      display: block;
      animation: fadeSlideIn 0.15s ease;
    }

    .panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px 10px;
      border-bottom: 1px solid var(--border-color);
    }

    .panel-title {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1.2px;
      text-transform: uppercase;
      color: var(--text-dim);
    }

    .panel-close {
      width: 22px;
      height: 22px;
      border-radius: 4px;
      border: none;
      background: rgba(255, 255, 255, 0.05);
      color: var(--text-dim);
      cursor: pointer;
      font-size: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
    }

    .panel-close:hover {
      background: rgba(255, 82, 82, 0.15);
      color: var(--danger-color);
    }

    /* ===== SETTINGS PANEL ===== */
    #settings-panel {
      top: calc(var(--topbar-h) + 8px);
      right: 14px;
      width: 268px;
      padding: 0 0 8px;
    }

    .settings-section {
      padding: 10px 16px 4px;
    }

    .settings-section-title {
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: #3a4255;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .settings-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 7px 0;
      border-bottom: 1px solid rgba(255, 255, 255, 0.03);
    }

    .settings-row:last-child {
      border-bottom: none;
    }

    .settings-label {
      font-size: 13px;
      color: var(--text-main);
      cursor: pointer;
    }

    .settings-label:hover {
      color: #fff;
    }

    /* Toggle switch */
    .toggle-switch {
      position: relative;
      width: 36px;
      height: 20px;
      flex-shrink: 0;
    }

    .toggle-switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .toggle-slider {
      position: absolute;
      inset: 0;
      background: #1a1f2e;
      border-radius: 20px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .toggle-slider::before {
      content: '';
      position: absolute;
      width: 14px;
      height: 14px;
      left: 3px;
      bottom: 3px;
      background: #3a4255;
      border-radius: 50%;
      transition: transform 0.2s, background 0.2s;
    }

    .toggle-switch input:checked+.toggle-slider {
      background: rgba(0, 230, 118, 0.2);
    }

    .toggle-switch input:checked+.toggle-slider::before {
      transform: translateX(16px);
      background: var(--accent-color);
    }

    /* ===== CACHE MANAGER PANEL ===== */
    #cache-panel {
      top: calc(var(--topbar-h) + 8px);
      right: 58px;
      width: 320px;
    }

    #cache-list {
      max-height: 320px;
      overflow-y: auto;
      padding: 4px 0;
    }

    #cache-list::-webkit-scrollbar {
      width: 4px;
    }

    #cache-list::-webkit-scrollbar-thumb {
      background: #1e2435;
      border-radius: 2px;
    }

    .cache-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 16px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.03);
      transition: background 0.12s;
    }

    .cache-item:last-child {
      border-bottom: none;
    }

    .cache-item:hover {
      background: rgba(255, 255, 255, 0.02);
    }

    .cache-sym {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-main);
      flex: 1;
    }

    .cache-meta {
      font-size: 11px;
      color: var(--text-dim);
    }

    .cache-size {
      font-size: 11px;
      color: #3a4255;
      margin-right: 4px;
    }

    .cache-del-btn {
      width: 22px;
      height: 22px;
      border-radius: 5px;
      border: 1px solid rgba(255, 82, 82, 0.25);
      background: rgba(255, 82, 82, 0.07);
      color: var(--danger-color);
      cursor: pointer;
      font-size: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
      flex-shrink: 0;
    }

    .cache-del-btn:hover {
      background: rgba(255, 82, 82, 0.2);
    }

    .cache-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 16px;
      border-top: 1px solid var(--border-color);
    }

    .cache-total {
      font-size: 11px;
      color: var(--text-dim);
    }

    .clear-all-btn {
      height: 28px;
      padding: 0 12px;
      border: 1px solid rgba(255, 82, 82, 0.3);
      border-radius: 6px;
      background: rgba(255, 82, 82, 0.08);
      color: var(--danger-color);
      cursor: pointer;
      font-family: inherit;
      font-size: 11px;
      font-weight: 600;
      transition: all 0.15s;
    }

    .clear-all-btn:hover {
      background: rgba(255, 82, 82, 0.18);
    }

    .cache-empty {
      padding: 24px 16px;
      text-align: center;
      color: #3a4255;
      font-size: 13px;
    }

    /* ===== CHART AREA ===== */
    #main-area {
      display: flex;
      width: 100vw;
      height: calc(100vh - var(--topbar-h));
      transition: height 0.2s;
    }

    body.fullscreen #topbar {
      display: none;
    }

    body.fullscreen #main-area {
      height: 100vh;
    }

    body.fullscreen #settings-panel,
    body.fullscreen #cache-panel {
      top: 8px;
    }

    #chart-wrapper {
      position: relative;
      flex: 1;
      height: 100%;
      min-width: 0;
      /* Hand ALL touch gestures to lightweight-charts, never the browser */
      touch-action: none;
    }

    #chart-container {
      width: 100%;
      height: 100%;
    }

    #overlay-canvas {
      position: absolute;
      top: 0;
      left: 0;
      pointer-events: none;
      z-index: 5;
    }

    @keyframes fadeSlideIn {
      from {
        opacity: 0;
        transform: translateY(-6px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>

<body>
  <!-- TOPBAR -->
  <div id="topbar">
    <!-- Brand -->
    <div class="tb-brand">
      <div class="tb-brand-icon">M</div>
      <span class="tb-brand-name">MINTCHART</span>
    </div>

    <!-- Symbol Search -->
    <div class="tb-symbol-block">
      <div id="symbol-search-wrapper">
        <span class="sym-search-icon">⌕</span>
        <input id="symbol-input" type="text" placeholder="Symbol..." autocomplete="off" spellcheck="false" />
        <div id="symbol-dropdown"></div>
      </div>
    </div>

    <!-- Interval pill buttons -->
    <div class="tb-intervals" id="interval-pills">
      <button class="iv-btn" data-iv="1m">1m</button>

  <script>
    // === Reactive Config (dynamic, changes when user switches symbol/interval) ===
    let SYMBOL = "";
    let INTERVAL = "15m";
    const LIMIT = 50000;

    // ATR Bot Settings
    const ATR_LENGTH = 10;
    const EMA_LENGTH = 21;
    const ATR_MULT = 1.618;

    // VP Settings
    const NUM_ROWS = 24;
    const VA_PCT = 70;

    // VSR Settings
    const VSR_LENGTH = 20;
    const VSR_THRESHOLD = 10.0;

    let chart, candleSeries, t1Series, t2Series, t1Series2, t2Series2;
    const canvas = document.getElementById("overlay-canvas");
    const ctx = canvas.getContext("2d");
    let globalCycles = [];
    let globalVsrZones = [];

    // Measure Tool State
    let globalBars = [];
    let measureState = {
      modeActive: false,
      step: 0,
      startIdx: null,
      endIdx: null,
    };
    let lastCrosshairLogical = null;

    // Toggles State (Load from localStorage)
    let showATR1 = localStorage.getItem("stat1_showATR1") !== "0";
    let showATR2 = localStorage.getItem("stat1_showATR2") !== "0";
    let showVSR = localStorage.getItem("stat1_showVSR") !== "0";
    let showVPVol = localStorage.getItem("stat1_showVPVol") !== "0";
    let showVWAP = localStorage.getItem("stat1_showVWAP") !== "0";

    // Drawing State
    let drawingModeActive = false;
    let drawnRects = [];
    try {
      let savedRects = localStorage.getItem("stat1_drawnRects");
      if (savedRects) drawnRects = JSON.parse(savedRects);
    } catch (e) { }

    let drawingVPModeActive = false;
    let drawnVpRects = [];
    try {
      let savedVps = localStorage.getItem("stat1_drawnVpRects");
      if (savedVps) drawnVpRects = JSON.parse(savedVps);
    } catch (e) { }

    let vpCreateState = { active: false, logical1: null, logical2: null };
    let rectDragState = {
      active: false, mode: "", isVp: false, index: -1,
      startLogical: null, startPrice: null,
      originalLogical1: null, originalLogical2: null,
      originalPrice1: null, originalPrice2: null,
    };
    let rectCreateState = { active: false, logical1: null, price1: null, logical2: null, price2: null };
    let hoveredRectIndex = -1;
    let hoveredVpIndex = -1;
    let hoveredCorner = "";
    let selectedRectIndex = -1;
    let selectedVpIndex = -1;
    let vwapSeries;

    // =============================================
    // SYMBOL SEARCH & EXCHANGE INFO
    // =============================================
    let allSymbols = []; // full list from Binance Futures exchange info

    function getCachedSymbolsList() {
      // Scan localStorage for keys matching our data cache pattern
      const cached = new Set();
      for (let i = 0; i < localStorage.length; i++) {
        const key = localStorage.key(i);
        if (key && key.endsWith("_DB_v6")) {
          // Key format: "BTCUSDT_15m_DB_v6"
          const parts = key.split("_");
          if (parts.length >= 3) cached.add(parts[0]);
        }
      }
      return cached;
    }

    async function fetchExchangeInfo() {
      const cacheKey = "binance_futures_exchange_info_v1";
      const cacheTs = "binance_futures_exchange_info_ts";
      const TTL = 24 * 60 * 60 * 1000; // 24 hours

      // Return from localStorage if fresh
      try {
        const ts = parseInt(localStorage.getItem(cacheTs) || "0");
        if (Date.now() - ts < TTL) {
          const cached = localStorage.getItem(cacheKey);
          if (cached) return JSON.parse(cached);
        }
      } catch (e) { }

      try {
        const res = await fetch("https://fapi.binance.com/fapi/v1/exchangeInfo");
        const data = await res.json();
        const symbols = data.symbols
          .filter(s => s.status === "TRADING" && s.contractType === "PERPETUAL")
          .map(s => s.symbol)
          .sort();
        localStorage.setItem(cacheKey, JSON.stringify(symbols));
        localStorage.setItem(cacheTs, Date.now().toString());
        return symbols;
      } catch (e) {
        console.error("Failed to fetch exchange info", e);
        return [];
      }
    }

    function getStartSymbol() {
      // Priority 1: last used symbol saved in localStorage
      const last = localStorage.getItem("stat1_lastSymbol");
      if (last) return last;
      // Priority 2: first symbol that has OHLCV data cached
      const cachedSet = getCachedSymbolsList();
      if (cachedSet.size > 0) return Array.from(cachedSet)[0];
      // Fallback
      return "BTCUSDT";
    }

    function setupSymbolSearch() {
      const input = document.getElementById("symbol-input");
      const dropdown = document.getElementById("symbol-dropdown");
      const cachedSet = getCachedSymbolsList();

      function renderDropdown(query) {
        const q = query.trim().toUpperCase();
        let filtered = q
          ? allSymbols.filter(s => s.includes(q))
          : [...allSymbols];

        // Put cached symbols first
        filtered.sort((a, b) => {
          const aC = cachedSet.has(a) ? 0 : 1;
          const bC = cachedSet.has(b) ? 0 : 1;
          return aC - bC || a.localeCompare(b);
        });

        const top = filtered.slice(0, 60);
        if (top.length === 0) {
          dropdown.innerHTML = `<div style="padding:12px 14px;color:#555;font-size:12px;">No results</div>`;
          dropdown.classList.add("open");
          return;
        }

        let html = "";
        let hasCachedSection = false;
        let hasOthersSection = false;

        for (const sym of top) {
          const isCached = cachedSet.has(sym);
          if (isCached && !hasCachedSection) {
            html += `<div class="sym-group-label">⚡ Cached</div>`;
            hasCachedSection = true;
          }
          if (!isCached && !hasOthersSection) {
            html += `<div class="sym-group-label">All Symbols</div>`;
            hasOthersSection = true;
          }
          const badge = isCached
            ? `<span class="sym-badge cached">CACHED</span>`
            : ``;
          html += `<div class="sym-item" data-sym="${sym}">
            <span class="sym-name">${sym}</span>${badge}
          </div>`;
        }

        dropdown.innerHTML = html;
        dropdown.classList.add("open");

        dropdown.querySelectorAll(".sym-item").forEach(el => {
          el.addEventListener("mousedown", (e) => {
            e.preventDefault();
            const sym = el.dataset.sym;
            selectSymbol(sym);
          });
        });
      }

      input.addEventListener("focus", () => {
        renderDropdown(input.value);
      });

      input.addEventListener("input", () => {
        renderDropdown(input.value);
      });

      input.addEventListener("keydown", (e) => {
        if (e.key === "Escape") {
          dropdown.classList.remove("open");
          input.blur();
        }
        if (e.key === "Enter") {
          const q = input.value.trim().toUpperCase();
          if (allSymbols.includes(q)) selectSymbol(q);
        }
      });

      document.addEventListener("click", (e) => {
        if (!e.target.closest("#symbol-search-wrapper")) {
          dropdown.classList.remove("open");
        }
      });
    }

    async function selectSymbol(sym) {
      if (!sym || sym === SYMBOL) {
        document.getElementById("symbol-dropdown").classList.remove("open");
        return;
      }
      SYMBOL = sym;
      document.getElementById("symbol-input").value = sym;
      document.getElementById("symbol-dropdown").classList.remove("open");
      localStorage.setItem("stat1_lastSymbol", sym);

      setStatus("loading", `Loading ${sym}...`);
      if (window._tickerWS) { window._tickerWS.close(); window._tickerWS = null; }
      await loadSymbol();
      setupTickerWS(sym);
    }

    // =============================================
    // PRICE FORMAT — auto-detect precision per symbol
    // =============================================
    function getPriceFormat(price) {
      if (!price || price <= 0) return { precision: 4, minMove: 0.0001 };
      if (price >= 10000) return { precision: 1, minMove: 0.1 };
      if (price >= 1000) return { precision: 2, minMove: 0.01 };
      if (price >= 100) return { precision: 3, minMove: 0.001 };
      // Minimum precision is always 4 decimal places (0.0001)
      return { precision: 4, minMove: 0.0001 };
    }

    function applyPriceFormat(bars) {
      if (!bars || bars.length === 0) return;
      const lastPrice = bars[bars.length - 1].close;
      const { precision, minMove } = getPriceFormat(lastPrice);
      const fmt = { type: "price", precision, minMove };
      [candleSeries, t1Series, t2Series, t1Series2, t2Series2, vwapSeries].forEach(s => {
        if (s) s.applyOptions({ priceFormat: fmt });
      });
    }

    // =============================================
    // STATUS HELPER
    // =============================================
    function setStatus(type, text) {
      const el = document.getElementById("status");
      if (type === "loading") {
        el.innerHTML = `<div class="status-loading-spin"></div><span>${text}</span>`;
      } else if (type === "ready") {
        el.innerHTML = `<div class="status-dot"></div><span class="sym-tag">${SYMBOL}</span><span class="intv-tag">${INTERVAL}</span><span class="bars-tag">${text}</span>`;
      } else if (type === "error") {
        el.innerHTML = `<span style="color:var(--danger-color)">${text}</span>`;
      } else {
        el.innerHTML = `<span style="color:#3a4255">${text}</span>`;
      }
    }

    // =============================================
    // INTERVAL PILLS
    // =============================================
    function setupIntervalPills() {
      const savedInterval = localStorage.getItem("stat1_interval");
      if (savedInterval) INTERVAL = savedInterval;

      const pills = document.querySelectorAll(".iv-btn");
      // Mark active
      pills.forEach(btn => {
        btn.classList.toggle("active", btn.dataset.iv === INTERVAL);
      });

      pills.forEach(btn => {
        btn.addEventListener("click", async () => {
          const iv = btn.dataset.iv;
          if (iv === INTERVAL) return;
          INTERVAL = iv;
          localStorage.setItem("stat1_interval", iv);
          pills.forEach(b => b.classList.toggle("active", b.dataset.iv === iv));
          if (SYMBOL) {
            setStatus("loading", `Loading ${SYMBOL} ${iv}...`);
            await loadSymbol();
          }
        });
      });
    }

    // (fullscreen removed)

    // =============================================
    // SETTINGS PANEL
    // =============================================
    function setupSettingsPanel() {
      const btn = document.getElementById("settings-btn");
      const panel = document.getElementById("settings-panel");
      const closeBtn = document.getElementById("settings-close");

      function togglePanel(force) {
        const isOpen = force !== undefined ? force : !panel.classList.contains("open");
        panel.classList.toggle("open", isOpen);
        btn.classList.toggle("active", isOpen);
        // Close cache when opening settings
        if (isOpen) {
          document.getElementById("cache-panel").classList.remove("open");
          document.getElementById("cache-btn").classList.remove("active");
        }
      }

      btn.addEventListener("click", (e) => { e.stopPropagation(); togglePanel(); });
      closeBtn.addEventListener("click", () => togglePanel(false));
      document.addEventListener("click", (e) => {
        if (!e.target.closest("#settings-panel") && !e.target.closest("#settings-btn"))
          togglePanel(false);
      });
    }

    // =============================================
    // CACHE MANAGER
    // =============================================
    function setupCacheManager() {
      const btn = document.getElementById("cache-btn");
      const panel = document.getElementById("cache-panel");
      const closeBtn = document.getElementById("cache-close");
      const clearAllBtn = document.getElementById("clear-all-cache");

      function getOHLCVKeys() {
        const keys = [];
        for (let i = 0; i < localStorage.length; i++) {
          const key = localStorage.key(i);
          if (key && key.endsWith("_DB_v6")) keys.push(key);
        }
        return keys.sort();
      }

      function formatBytes(bytes) {
        if (bytes < 1024) return bytes + " B";
        if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + " KB";
        return (bytes / 1024 / 1024).toFixed(2) + " MB";
      }

      function renderCacheList() {
        const listEl = document.getElementById("cache-list");
        const totalEl = document.getElementById("cache-total-size");
        const keys = getOHLCVKeys();

        if (keys.length === 0) {
          listEl.innerHTML = `<div class="cache-empty">No cached data found</div>`;
          totalEl.textContent = "0 entries";
          return;
        }

        let totalBytes = 0;
        let html = "";
        for (const key of keys) {
          const val = localStorage.getItem(key) || "";
          const bytes = new Blob([val]).size;
          totalBytes += bytes;
          // Parse symbol + interval from key: "BTCUSDT_15m_DB_v6"
          const parts = key.replace("_DB_v6", "").split("_");
          const sym = parts[0];
          const iv = parts.slice(1).join("_");
          let bars = 0;
          try { bars = JSON.parse(val).length; } catch (e) { }
          html += `
            <div class="cache-item">
              <span class="cache-sym">${sym}</span>
              <span class="cache-meta">${iv} &middot; ${bars.toLocaleString()} bars</span>
              <span class="cache-size">${formatBytes(bytes)}</span>
              <button class="cache-del-btn" data-key="${key}" title="Delete">✕</button>
            </div>`;
        }
        listEl.innerHTML = html;
        totalEl.textContent = `${keys.length} entries · ${formatBytes(totalBytes)}`;

        listEl.querySelectorAll(".cache-del-btn").forEach(b => {
          b.addEventListener("click", () => {
            localStorage.removeItem(b.dataset.key);
            renderCacheList();
          });
        });
      }

      function togglePanel(force) {
        const isOpen = force !== undefined ? force : !panel.classList.contains("open");
        if (isOpen) renderCacheList();
        panel.classList.toggle("open", isOpen);
        btn.classList.toggle("active", isOpen);
        if (isOpen) {
          document.getElementById("settings-panel").classList.remove("open");
          document.getElementById("settings-btn").classList.remove("active");
        }
      }

      btn.addEventListener("click", (e) => { e.stopPropagation(); togglePanel(); });
      closeBtn.addEventListener("click", () => togglePanel(false));
      clearAllBtn.addEventListener("click", () => {
        const keys = getOHLCVKeys();
        if (keys.length === 0) return;
        if (confirm(`Delete all ${keys.length} cached datasets?`)) {
          keys.forEach(k => localStorage.removeItem(k));
          renderCacheList();
        }
      });
      document.addEventListener("click", (e) => {
        if (!e.target.closest("#cache-panel") && !e.target.closest("#cache-btn"))
          togglePanel(false);
      });
    }

    // =============================================
    // LIVE TICKER via WebSocket
    // =============================================
    let _prevTickerPrice = 0;
    function setupTickerWS(sym) {
      if (!sym) return;
      if (window._tickerWS) { window._tickerWS.close(); }
      const wsUrl = `wss://fstream.binance.com/ws/${sym.toLowerCase()}@ticker`;
      const ws = new WebSocket(wsUrl);
      window._tickerWS = ws;

      ws.onmessage = (ev) => {
        try {
          const d = JSON.parse(ev.data);
          const price = parseFloat(d.c);
          const change = parseFloat(d.P); // % change
          const { precision } = getPriceFormat(price);

          const priceEl = document.getElementById("ticker-price");
          const changeEl = document.getElementById("ticker-change");

          // Flash color
          if (_prevTickerPrice && price !== _prevTickerPrice) {
            priceEl.className = price > _prevTickerPrice ? "tick-up" : "tick-down";
            setTimeout(() => { priceEl.className = ""; }, 400);
          }
          _prevTickerPrice = price;

          priceEl.textContent = price.toFixed(precision);
          changeEl.textContent = (change >= 0 ? "+" : "") + change.toFixed(2) + "%";
          changeEl.className = change >= 0 ? "up" : "down";
        } catch (e) { }
      };
      ws.onerror = () => { };
    }

    async function fetchBinanceData() {
      const cacheKey = `${SYMBOL}_${INTERVAL}_DB_v6`;
      const statusText = document.getElementById("status");
      let existingBars = [];

      // 1. Load existing cache
      const cached = localStorage.getItem(cacheKey);
      if (cached) {
        try {
          const parsed = JSON.parse(cached);
          if (parsed && parsed.length > 0 && Array.isArray(parsed[0])) {
            existingBars = parsed.map((p) => ({
              time: p[0],
              open: p[1],
              high: p[2],
              low: p[3],
              close: p[4],
              volume: p[5],
              buyVolume: p[6],
            }));
          }
        } catch (e) {
          console.error("Cache parsing error", e);
        }
      }

      const batchSize = 1500;
      const unique = new Map();
      existingBars.forEach((b) => unique.set(b.time * 1000, b));

      // 2. Fetch missing NEW data (forward)
      let lastTime =
        existingBars.length > 0
          ? existingBars[existingBars.length - 1].time * 1000
          : 0;
      if (lastTime > 0) {
        statusText.innerHTML = `<span class="status-loading">Checking for new data... (${SYMBOL})</span>`;
        try {
          let startTime = lastTime + 1;
          let url = `https://fapi.binance.com/fapi/v1/klines?symbol=${SYMBOL}&interval=${INTERVAL}&limit=${batchSize}&startTime=${startTime}`;
          let res = await fetch(url);
          let data = await res.json();
          if (data && data.length > 0 && !data.code) {
            data.forEach((d) => {
              unique.set(d[0], {
                time: d[0] / 1000,
                open: parseFloat(d[1]),
                high: parseFloat(d[2]),
                low: parseFloat(d[3]),
                close: parseFloat(d[4]),
                volume: parseFloat(d[5]),
                buyVolume: parseFloat(d[9]),
              });
            });
            console.log(`Added ${data.length} new bars.`);
          }
        } catch (e) {
          console.error("Fetch new data failed", e);
        }
      }

      // 3. Fetch missing HISTORICAL data (backward)
      let currentSize = unique.size;
      if (currentSize < LIMIT) {
        let firstTime =
          existingBars.length > 0 ? existingBars[0].time * 1000 : Date.now();
        let endTime = firstTime - 1;

        while (unique.size < LIMIT) {
          statusText.innerHTML = `<span class="status-loading">Loading ${SYMBOL} history... (${unique.size.toLocaleString()} / ${LIMIT.toLocaleString()})</span>`;
          let url = `https://fapi.binance.com/fapi/v1/klines?symbol=${SYMBOL}&interval=${INTERVAL}&limit=${batchSize}&endTime=${endTime}`;

          try {
            let res = await fetch(url);
            let data = await res.json();

            if (!data || data.length === 0 || data.code) break;

            data.forEach((d) => {
              unique.set(d[0], {
                time: d[0] / 1000,
                open: parseFloat(d[1]),
                high: parseFloat(d[2]),
                low: parseFloat(d[3]),
                close: parseFloat(d[4]),
                volume: parseFloat(d[5]),
                buyVolume: parseFloat(d[9]),
              });
            });

            endTime = data[0][0] - 1;
            if (data.length < batchSize) break;
          } catch (e) {
            console.error("Fetch history failed", e);
            break;
          }
        }
      }

      // 4. Sort and Limit
      let sorted = Array.from(unique.values()).sort(
        (a, b) => a.time - b.time,
      );
      if (sorted.length > LIMIT) {
        sorted = sorted.slice(sorted.length - LIMIT);
      }

      // 5. Cache as array of arrays
      const compressed = sorted.map((c) => [
        c.time,
        c.open,
        c.high,
        c.low,
        c.close,
        c.volume,
        c.buyVolume,
      ]);

      try {
        localStorage.setItem(cacheKey, JSON.stringify(compressed));
      } catch (err) {
        console.warn("Storage full, clearing old keys...");
        localStorage.clear(); // Extreme cleanup
        try {
          localStorage.setItem(cacheKey, JSON.stringify(compressed));
        } catch (e) { }
      }

      return sorted;
    }

    function calculateATRBot(bars, atrLen, emaLen, mult) {
      if (bars.length === 0) return { t1Data: [], t2Data: [], cycles: [] };

      // 1. Calculate TR
      let tr = new Array(bars.length);
      for (let i = 0; i < bars.length; i++) {
        if (i === 0) {
          tr[i] = bars[i].high - bars[i].low;
        } else {
          let h_l = bars[i].high - bars[i].low;
          let h_pc = Math.abs(bars[i].high - bars[i - 1].close);
          let l_pc = Math.abs(bars[i].low - bars[i - 1].close);
          tr[i] = Math.max(h_l, h_pc, l_pc);
        }
      }

      // 2. Calculate ATR (RMA of TR)
      let atr = new Array(bars.length);
      let alpha = 1 / atrLen;
      let sum = 0;
      for (let i = 0; i < bars.length; i++) {
        if (i < atrLen) {
          sum += tr[i];
          atr[i] = sum / (i + 1);
        } else {
          atr[i] = alpha * tr[i] + (1 - alpha) * atr[i - 1];
        }
      }

      // 3. Calculate EMA
      let ema = new Array(bars.length);
      let k = 2 / (emaLen + 1);
      for (let i = 0; i < bars.length; i++) {
        if (i === 0) ema[i] = bars[i].close;
        else ema[i] = bars[i].close * k + ema[i - 1] * (1 - k);
      }

      // 4. Calculate Trail2 & State
      let trail2 = new Array(bars.length);
      let state = new Array(bars.length); // 1 = Uptrend, -1 = Downtrend

      for (let i = 0; i < bars.length; i++) {
        let loss = atr[i] * mult;
        let t1 = ema[i];

        if (i === 0) {
          trail2[i] = t1 - loss;
          state[i] = 1;
          continue;
        }

        let prev_t2 = trail2[i - 1];
        let prev_t1 = ema[i - 1];
        let curr_t2;

        if (t1 > prev_t2 && prev_t1 > prev_t2) {
          curr_t2 = Math.max(prev_t2, t1 - loss);
        } else if (t1 < prev_t2 && prev_t1 < prev_t2) {
          curr_t2 = Math.min(prev_t2, t1 + loss);
        } else if (t1 > prev_t2) {
          curr_t2 = t1 - loss;
        } else {
          curr_t2 = t1 + loss;
        }

        trail2[i] = curr_t2;
        state[i] = t1 > curr_t2 ? 1 : -1;
      }

      // 5. Build LWC Line Data & Extract Cycles
      let t1Data = [];
      let t2Data = [];
      let cycles = [];
      let currentCycle = null;

      for (let i = 0; i < bars.length; i++) {
        let t = bars[i].time;
        let isUp = state[i] === 1;
        let color = isUp ? "#00E676" : "#FF5252";

        t1Data.push({ time: t, value: ema[i], color: color });
        t2Data.push({ time: t, value: trail2[i], color: color });

        let barData = { ...bars[i], t1: ema[i], t2: trail2[i] };

        if (currentCycle === null) {
          currentCycle = {
            state: state[i],
            startIndex: i,
            endIndex: i,
            bars: [barData],
          };
        } else if (currentCycle.state !== state[i]) {
          cycles.push(currentCycle);
          currentCycle = {
            state: state[i],
            startIndex: i,
            endIndex: i,
            bars: [barData],
          };
        } else {
          currentCycle.endIndex = i;
          currentCycle.bars.push(barData);
        }
      }

      if (currentCycle) {
        cycles.push(currentCycle);
      }
      return { t1Data, t2Data, cycles };
    }

    // Bulk Volume Classification (BVC) Algorithm
    function calculateBVCVolumes(bars, windowSize = 20) {
      // Approximation of standard normal CDF
      function normalCDF(x) {
        let t = 1 / (1 + 0.2316419 * Math.abs(x));
        let d = 0.3989423 * Math.exp((-x * x) / 2);
        let prob =
          d *
          t *
          (0.3193815 +
            t *
            (-0.3565638 + t * (1.781478 + t * (-1.821256 + t * 1.330274))));
        return x > 0 ? 1 - prob : prob;
      }

      let deltaPArray = bars.map((b) => b.close - b.open);

      for (let i = 0; i < bars.length; i++) {
        let b = bars[i];
        let startIdx = Math.max(0, i - windowSize + 1);
        let count = i - startIdx + 1;

        let mean = 0;
        for (let j = startIdx; j <= i; j++) mean += deltaPArray[j];
        mean /= count;

        let variance = 0;
        for (let j = startIdx; j <= i; j++)
          variance += Math.pow(deltaPArray[j] - mean, 2);
        variance /= count;

        let stdDev = Math.sqrt(variance);
        let deltaP = deltaPArray[i];

        let Z = 0;
        if (stdDev > 1e-10) {
          Z = deltaP / stdDev;
        } else {
          Z = deltaP > 0 ? 3 : deltaP < 0 ? -3 : 0;
        }

        let phiZ = normalCDF(Z);
        b.bvcBuy = b.volume * phiZ;
        b.bvcSell = b.volume * (1 - phiZ);
      }
    }

    function calculateFRVP(bars) {
      let numRows = NUM_ROWS;
      let vaPct = VA_PCT;
      let profile = [];
      // Simple logic: We'll calculate a single Fixed Range Volume Profile for the visible data
      if (bars.length === 0)
        return {
          rows: [],
          maxVol: 0,
          pocPrice: 0,
          pocDelta: 0,
          vahPrice: 0,
          valPrice: 0,
        };

      let highestHigh = -Infinity;
      let lowestLow = Infinity;
      bars.forEach((d) => {
        if (d.high > highestHigh) highestHigh = d.high;
        if (d.low < lowestLow) lowestLow = d.low;
      });

      if (
        highestHigh === -Infinity ||
        lowestLow === Infinity ||
        Math.abs(highestHigh - lowestLow) < 1e-10
      ) {
        return {
          rows: [],
          maxVol: 0,
          pocPrice: 0,
          pocDelta: 0,
          vahPrice: 0,
          valPrice: 0,
        };
      }

      let rowHeight = (highestHigh - lowestLow) / numRows;
      let rows = new Array(numRows).fill(0).map((_, i) => ({
        priceTop: highestHigh - i * rowHeight,
        priceBottom: highestHigh - (i + 1) * rowHeight,
        vol: 0,
        buyVol: 0,
        sellVol: 0,
        poc: false,
        vah: false,
        val: false,
        inVA: false,
      }));

      // Distribute volume into rows using BVC logic
      for (let b of bars) {
        if (b.volume <= 0) continue;

        let startRow = Math.floor((highestHigh - b.high) / rowHeight);
        let endRow = Math.floor((highestHigh - b.low) / rowHeight);

        startRow = Math.max(0, Math.min(numRows - 1, startRow));
        endRow = Math.max(0, Math.min(numRows - 1, endRow));

        let bBuy = b.bvcBuy || 0;
        let bSell = b.bvcSell || 0;

        if (b.high === b.low) {
          rows[startRow].vol += b.volume;
          rows[startRow].buyVol += bBuy;
          rows[startRow].sellVol += bSell;
          continue;
        }

        let totalOverlap = 0;
        let overlapInfos = [];

        for (let r = startRow; r <= endRow; r++) {
          let rowTop = highestHigh - r * rowHeight;
          let rowBottom = highestHigh - (r + 1) * rowHeight;
          let overlapBottom = Math.max(b.low, rowBottom);
          let overlapTop = Math.min(b.high, rowTop);
          let overlap = overlapTop - overlapBottom;
          if (overlap > 0) {
            overlapInfos.push({ r, overlap });
            totalOverlap += overlap;
          }
        }

        if (totalOverlap > 0) {
          for (let info of overlapInfos) {
            let pct = info.overlap / totalOverlap;
            rows[info.r].vol += pct * b.volume;
            rows[info.r].buyVol += pct * bBuy;
            rows[info.r].sellVol += pct * bSell;
          }
        } else {
          rows[startRow].vol += b.volume;
          rows[startRow].buyVol += bBuy;
          rows[startRow].sellVol += bSell;
        }
      }

      // Find POC
      let pocIndex = 0;
      let maxVol = 0;
      rows.forEach((r, index) => {
        let totalRowVol = r.buyVol + r.sellVol; // Should be approximately r.vol
        if (totalRowVol > maxVol) {
          maxVol = totalRowVol;
          pocIndex = index;
        }
      });

      let pocDelta = rows[pocIndex].buyVol - rows[pocIndex].sellVol;

      rows[pocIndex].poc = true;
      let pocPrice =
        (rows[pocIndex].priceTop + rows[pocIndex].priceBottom) / 2;

      // Calculate Value Area
      let totalVol = rows.reduce((sum, r) => sum + r.vol, 0);
      let vaVol = maxVol;
      rows[pocIndex].inVA = true;
      let upIndex = pocIndex - 1; // Since index 0 is Top, upIndex is numerically smaller (higher price)
      let downIndex = pocIndex + 1; // lower price

      while (vaVol < totalVol * (vaPct / 100)) {
        let volUp = upIndex >= 0 ? rows[upIndex].vol : 0;
        let volDown = downIndex < numRows ? rows[downIndex].vol : 0;

        if (volUp === 0 && volDown === 0) break;

        // Pick the larger row volume to add to Value Area
        if (volUp > volDown) {
          vaVol += volUp;
          rows[upIndex].inVA = true;
          upIndex--;
        } else {
          vaVol += volDown;
          rows[downIndex].inVA = true;
          downIndex++;
        }
      }

      // Find VAH and VAL
      let vahPrice = rows.find((r) => r.inVA)?.priceTop || highestHigh;
      let valPrice =
        [...rows].reverse().find((r) => r.inVA)?.priceBottom || lowestLow;

      return { rows, pocPrice, pocDelta, vahPrice, valPrice, maxVol };
    }

    function calculateVSR(bars, length = 10, threshold = 5.0) {
      let zones = [];
      let prev_volume = NaN,
        prev_high = NaN,
        prev_low = NaN,
        prev_close = NaN,
        prev_stdev = NaN;
      let volume_changes = [];
      let vsr_upper = NaN,
        vsr_lower = NaN;
      let currentZone = null;

      for (let i = 0; i < bars.length; i++) {
        let b = bars[i];
        let volume = b.volume,
          high = b.high,
          low = b.low,
          close = b.close;

        let change = 0;
        if (!isNaN(prev_volume) && prev_volume !== 0) {
          change = volume / prev_volume - 1;
        }

        volume_changes.push(change);
        if (volume_changes.length > length) volume_changes.shift();

        let stdev = 0;
        if (volume_changes.length >= 2) {
          let sum = volume_changes.reduce((a, x) => a + x, 0);
          let mean = sum / volume_changes.length;
          let variance =
            volume_changes.reduce((a, x) => a + Math.pow(x - mean, 2), 0) /
            volume_changes.length;
          stdev = Math.sqrt(variance);
        }

        let difference = 0,
          signal = 0;
        if (
          !isNaN(prev_stdev) &&
          prev_stdev !== 0 &&
          volume_changes.length >= 2
        ) {
          difference = change / prev_stdev;
          signal = Math.abs(difference);
        }

        if (signal > threshold && !isNaN(prev_high)) {
          let proposed_upper = Math.max(prev_high, prev_close);
          let proposed_lower = Math.min(prev_low, prev_close);

          let isOverlap = false;
          if (!isNaN(vsr_upper) && !isNaN(vsr_lower)) {
            if (proposed_lower <= vsr_upper && vsr_lower <= proposed_upper) {
              isOverlap = true;
            }
          }

          if (isOverlap) {
            vsr_upper = Math.max(vsr_upper, proposed_upper);
            vsr_lower = Math.min(vsr_lower, proposed_lower);
            if (currentZone) {
              currentZone.upper = vsr_upper;
              currentZone.lower = vsr_lower;
            }
          } else {
            vsr_upper = proposed_upper;
            vsr_lower = proposed_lower;
            if (currentZone) {
              currentZone.endIndex = i - 1;
              zones.push(currentZone);
            }
            currentZone = {
              startIndex: i,
              endIndex: i,
              upper: vsr_upper,
              lower: vsr_lower,
            };
          }
        } else if (currentZone) {
          currentZone.endIndex = i;
        }

        prev_volume = volume;
        prev_high = high;
        prev_low = low;
        prev_close = close;
        prev_stdev = stdev;
      }

      if (currentZone) {
        currentZone.endIndex = bars.length - 1;
        zones.push(currentZone);
      }
      return zones;
    }

    function calculateStandardVWAP(bars) {
      if (!bars || bars.length === 0) return;
      let currentDay = null;
      let sumVol = 0;
      let sumVolPrice = 0;

      for (let i = 0; i < bars.length; i++) {
        let b = bars[i];
        let date = new Date(b.time * 1000);
        // Standard session resets at 00:00 UTC
        let dayStr =
          date.getUTCFullYear() +
          "-" +
          date.getUTCMonth() +
          "-" +
          date.getUTCDate();

        if (dayStr !== currentDay) {
          currentDay = dayStr;
          sumVol = 0;
          sumVolPrice = 0;
        }

        let typPrice = (b.high + b.low + b.close) / 3;
        sumVol += b.volume;
        sumVolPrice += b.volume * typPrice;

        b.vwap = sumVol > 0 ? sumVolPrice / sumVol : b.close;
      }
    }

    function calculateStandardVWAP(bars) {
      let vwapData = [];
      if (!bars || bars.length === 0) return vwapData;
      let currentDay = null;
      let sumVol = 0;
      let sumVolPrice = 0;

      for (let i = 0; i < bars.length; i++) {
        let b = bars[i];
        let date = new Date(b.time * 1000);
        // Standard session usually resets at 00:00 UTC
        let dayStr =
          date.getUTCFullYear() +
          "-" +
          date.getUTCMonth() +
          "-" +
          date.getUTCDate();

        if (dayStr !== currentDay) {
          currentDay = dayStr;
          sumVol = 0;
          sumVolPrice = 0;
        }

        let typPrice = (b.high + b.low + b.close) / 3;
        sumVol += b.volume;
        sumVolPrice += b.volume * typPrice;

        b.vwap = sumVol > 0 ? sumVolPrice / sumVol : b.close;

        // For native series, we don't strictly need blanks unless gap is huge,
        // but we push it to data array properly.
        vwapData.push({ time: b.time, value: b.vwap });
      }
      return vwapData;
    }
