    function syncCanvasSize() {
      if (!chart || !candleSeries) return;
      const container = document.getElementById("chart-container");
      const width = container.clientWidth;
      const height = container.clientHeight;

      // Resize the chart object itself to fill the new container size
      chart.resize(width, height);

      // The canvas overlay should cover the main price pane
      // In Lightweight Charts, this can be retrieved from timeScale.width()
      // after the chart has been resized.
      const chartWidth = chart.timeScale().width();
      const chartHeight = height - 26; // Subtract approx time scale height (26px)

      canvas.width = chartWidth;
      canvas.height = chartHeight;
      canvas.style.width = chartWidth + "px";
      canvas.style.height = chartHeight + "px";

      drawOverlay();
    }

    function initResizeObserver() {
      const container = document.getElementById("chart-wrapper");
      const observer = new ResizeObserver(() => {
        syncCanvasSize();
      });
      observer.observe(container);
    }

    function drawOverlay() {
      if (!chart || !candleSeries || !globalCycles.length) return;

      const timeScale = chart.timeScale();

      ctx.clearRect(0, 0, canvas.width, canvas.height);

      let visibleRange = timeScale.getVisibleLogicalRange();
      if (!visibleRange) return;

      // Pass 0: Draw VSR Zones
      if (showVSR) {
        for (let z of globalVsrZones) {
          if (
            z.endIndex < visibleRange.from ||
            z.startIndex > visibleRange.to
          )
            continue;

          let xStart = timeScale.logicalToCoordinate(z.startIndex);
          let xEnd = timeScale.logicalToCoordinate(z.endIndex);
          if (xStart === null) xStart = -1000;
          if (xEnd === null) xEnd = canvas.width + 1000;

          let cycleW = xEnd - xStart;
          if (cycleW <= 0) continue;

          let y1 = candleSeries.priceToCoordinate(z.upper);
          let y2 = candleSeries.priceToCoordinate(z.lower);

          if (y1 !== null && y2 !== null) {
            let topY = Math.min(y1, y2);
            let botY = Math.max(y1, y2);
            ctx.fillStyle = "rgba(255, 235, 59, 0.2)"; // #FFEB3B with 20% transparency for VSR base
            ctx.fillRect(xStart, topY, cycleW, botY - topY);

            ctx.strokeStyle = "rgba(255, 235, 59, 0.4)";
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(xStart, topY);
            ctx.lineTo(xEnd, topY);
            ctx.moveTo(xStart, botY);
            ctx.lineTo(xEnd, botY);
            ctx.stroke();
          }
        }
      }

      // First pass: Draw ATR Cloud Fills
      if (showATR1) {
        for (let cycle of globalCycles) {
          if (
            cycle.endIndex < visibleRange.from ||
            cycle.startIndex > visibleRange.to
          )
            continue;

          ctx.beginPath();
          let hasMoved = false;

          // Move along T1
          for (let i = 0; i < cycle.bars.length; i++) {
            let b = cycle.bars[i];
            let logicalIdx = cycle.startIndex + i;
            if (
              logicalIdx < Math.floor(visibleRange.from) ||
              logicalIdx > Math.ceil(visibleRange.to)
            )
              continue;

            let x = timeScale.logicalToCoordinate(logicalIdx);
            let y = candleSeries.priceToCoordinate(b.t1);
            if (x !== null && y !== null) {
              if (!hasMoved) {
                ctx.moveTo(x, y);
                hasMoved = true;
              } else {
                ctx.lineTo(x, y);
              }
            }
          }

          // Move back along T2
          if (hasMoved) {
            for (let i = cycle.bars.length - 1; i >= 0; i--) {
              let b = cycle.bars[i];
              let logicalIdx = cycle.startIndex + i;
              if (
                logicalIdx < Math.floor(visibleRange.from) ||
                logicalIdx > Math.ceil(visibleRange.to)
              )
                continue;

              let x = timeScale.logicalToCoordinate(logicalIdx);
              let y = candleSeries.priceToCoordinate(b.t2);
              if (x !== null && y !== null) {
                ctx.lineTo(x, y);
              }
            }
            ctx.closePath();
            // TV style ATR cloud fills
            ctx.fillStyle =
              cycle.state === 1
                ? "rgba(0, 230, 118, 0.2)"
                : "rgba(255, 82, 82, 0.2)";
            ctx.fill();
          }
        }
      }

      // Recalculate and Draw VPs
      // Since VPs only depend on logical from/to, we extrapolate price min/max from bars
      let allVpToDraw = [...drawnVpRects];
      if (
        vpCreateState.active &&
        vpCreateState.logical1 !== null &&
        vpCreateState.logical2 !== null
      ) {
        allVpToDraw.push({
          l1: vpCreateState.logical1,
          l2: vpCreateState.logical2,
        });
      }

      for (let i = 0; i < allVpToDraw.length; i++) {
        let v = allVpToDraw[i];
        let idxFrom = Math.min(Math.round(v.l1), Math.round(v.l2));
        let idxTo = Math.max(Math.round(v.l1), Math.round(v.l2));

        if (idxTo < visibleRange.from || idxFrom > visibleRange.to) continue; // Out of view
        idxFrom = Math.max(0, idxFrom);
        idxTo = Math.min(globalBars.length - 1, idxTo);

        if (idxTo - idxFrom < 0) continue;

        let barsSlice = globalBars.slice(idxFrom, idxTo + 1);
        if (barsSlice.length === 0) continue;

        let highestHigh = -Infinity,
          lowestLow = Infinity;
        barsSlice.forEach((b) => {
          if (b.high > highestHigh) highestHigh = b.high;
          if (b.low < lowestLow) lowestLow = b.low;
        });

        // Set dynamic prices for bounding box
        v.p2 = highestHigh; // Top
        v.p1 = lowestLow; // Bottom

        let xStart = timeScale.logicalToCoordinate(v.l1 > v.l2 ? v.l2 : v.l1);
        let xEnd = timeScale.logicalToCoordinate(v.l1 > v.l2 ? v.l1 : v.l2);
        if (xStart === null) xStart = -1000;
        if (xEnd === null) xEnd = canvas.width + 1000;

        let cycleW = xEnd - xStart;
        if (cycleW <= 0) continue;

        // Draw Background/Selection Box for VP Region
        let hasHover =
          (i === hoveredVpIndex && !vpCreateState.active) ||
          (rectDragState.active &&
            rectDragState.isVp &&
            rectDragState.index === i);
        let isSel = i === selectedVpIndex && !vpCreateState.active;

        if (hasHover || isSel || vpCreateState.active) {
          let yH = candleSeries.priceToCoordinate(highestHigh);
          let yL = candleSeries.priceToCoordinate(lowestLow);
          if (yH !== null && yL !== null) {
            ctx.fillStyle = isSel
              ? "rgba(33, 150, 243, 0.15)"
              : hasHover
                ? "rgba(33, 150, 243, 0.1)"
                : "rgba(33, 150, 243, 0.05)";
            ctx.strokeStyle = isSel
              ? "rgba(33, 150, 243, 0.6)"
              : "rgba(33, 150, 243, 0.3)";
            ctx.lineWidth = 1;
            ctx.fillRect(xStart, yH, cycleW, yL - yH);
            ctx.strokeRect(xStart, yH, cycleW, yL - yH);

            if ((hasHover || isSel) && !vpCreateState.active) {
              ctx.fillStyle = "#C3C6CE";
              ctx.strokeStyle = "#0B0B0E";
              let hs = 6;
              // Left and Right handles only since VP height is determined by bars inside
              ctx.fillRect(xStart - hs / 2, (yH + yL) / 2 - hs / 2, hs, hs);
              ctx.strokeRect(xStart - hs / 2, (yH + yL) / 2 - hs / 2, hs, hs);
              ctx.fillRect(xEnd - hs / 2, (yH + yL) / 2 - hs / 2, hs, hs);
              ctx.strokeRect(xEnd - hs / 2, (yH + yL) / 2 - hs / 2, hs, hs);
            }
          }
        }

        // If just dragging/creating and not finalized, we can optionally skip heavy VP calculation to save lag, but keeping it smooth:
        if (!v.vpCache || vpCreateState.active || rectDragState.active) {
          // Rough caching logic (for real app needs refine, but fine here)
          v.vp = calculateFRVP(barsSlice); // Re-calculate dynamically
        }

        let cVP = v.vp;
        if (!cVP) continue;

        let maxBarWidth = Math.min(150, cycleW * 0.5);

        let yVAH = candleSeries.priceToCoordinate(cVP.vahPrice);
        let yVAL = candleSeries.priceToCoordinate(cVP.valPrice);

        if (yVAH !== null && yVAL !== null) {
          let topY = Math.min(yVAH, yVAL);
          let botY = Math.max(yVAH, yVAL);
          ctx.fillStyle = "rgba(41, 98, 255, 0.05)";
          ctx.fillRect(xStart, topY, cycleW, botY - topY);

          ctx.setLineDash([4, 4]);
          ctx.lineWidth = 1;
          ctx.strokeStyle = "rgba(33, 150, 243, 0.8)";
          ctx.beginPath();
          ctx.moveTo(xStart, topY);
          ctx.lineTo(xEnd, topY);
          ctx.stroke();
          ctx.strokeStyle = "rgba(255, 193, 7, 0.8)";
          ctx.beginPath();
          ctx.moveTo(xStart, botY);
          ctx.lineTo(xEnd, botY);
          ctx.stroke();
          ctx.setLineDash([]);
        }

        if (showVPVol) {
          for (let r of cVP.rows) {
            let yTop = candleSeries.priceToCoordinate(r.priceTop);
            let yBottom = candleSeries.priceToCoordinate(r.priceBottom);
            if (yTop !== null && yBottom !== null) {
              let topY = Math.min(yTop, yBottom);
              let hAdjusted =
                Math.abs(yBottom - yTop) -
                (Math.abs(yBottom - yTop) > 2 ? 1 : 0);

              let buyW = (r.buyVol / cVP.maxVol) * maxBarWidth;
              let sellW = (r.sellVol / cVP.maxVol) * maxBarWidth;

              let baseColor =
                r.buyVol >= r.sellVol
                  ? {
                    bright: r.inVA
                      ? "rgba(22, 112, 175, 0.95)"
                      : "rgba(22, 112, 175, 0.4)",
                    dark: r.inVA
                      ? "rgba(23, 72, 111, 0.95)"
                      : "rgba(23, 72, 111, 0.4)",
                    medium: r.inVA
                      ? "rgba(23, 52, 79, 0.95)"
                      : "rgba(23, 52, 79, 0.4)",
                  }
                  : {
                    bright: r.inVA
                      ? "rgba(183, 145, 38, 0.95)"
                      : "rgba(183, 145, 38, 0.4)",
                    dark: r.inVA
                      ? "rgba(103, 89, 43, 0.95)"
                      : "rgba(103, 89, 43, 0.4)",
                    medium: r.inVA
                      ? "rgba(62, 60, 45, 0.95)"
                      : "rgba(62, 60, 45, 0.4)",
                  };

              let currX = xStart;
              let deltaW = Math.abs(buyW - sellW);
              let weakW = Math.min(buyW, sellW);
              let strongW = Math.max(buyW, sellW) - deltaW;

              if (deltaW > 0) {
                ctx.fillStyle = baseColor.bright;
                ctx.fillRect(currX, topY, deltaW, hAdjusted);
                currX += deltaW;
              }
              if (weakW > 0) {
                ctx.fillStyle = baseColor.dark;
                ctx.fillRect(currX, topY, weakW, hAdjusted);
                currX += weakW;
              }
              if (strongW > 0) {
                ctx.fillStyle = baseColor.medium;
                ctx.fillRect(currX, topY, strongW, hAdjusted);
              }
            }
          }
        }

        let pocY = candleSeries.priceToCoordinate(cVP.pocPrice);
        if (pocY !== null) {
          ctx.strokeStyle =
            cVP.pocDelta >= 0
              ? "rgba(76, 175, 80, 0.9)"
              : "rgba(255, 82, 82, 0.9)";
          ctx.lineWidth = 2;
          ctx.beginPath();
          ctx.moveTo(xStart, pocY);
          ctx.lineTo(xEnd, pocY);
          ctx.stroke();
        }
      }

      // Pass 3: Draw Rectangles (User Drawn)
      let allRectsToDraw = [...drawnRects];
      if (
        rectCreateState.active &&
        rectCreateState.logical1 !== null &&
        rectCreateState.price1 !== null &&
        rectCreateState.logical2 !== null &&
        rectCreateState.price2 !== null
      ) {
        allRectsToDraw.push({
          l1: rectCreateState.logical1,
          p1: rectCreateState.price1,
          l2: rectCreateState.logical2,
          p2: rectCreateState.price2,
        });
      }

      for (let i = 0; i < allRectsToDraw.length; i++) {
        let rect = allRectsToDraw[i];
        let x1 = timeScale.logicalToCoordinate(rect.l1);
        let x2 = timeScale.logicalToCoordinate(rect.l2);
        let y1 = candleSeries.priceToCoordinate(rect.p1);
        let y2 = candleSeries.priceToCoordinate(rect.p2);

        if (x1 !== null && x2 !== null && y1 !== null && y2 !== null) {
          let rx = Math.min(x1, x2);
          let ry = Math.min(y1, y2);
          let rw = Math.abs(x2 - x1);
          let rh = Math.abs(y2 - y1);

          let isHovered =
            i === hoveredRectIndex ||
            (rectDragState.active && rectDragState.index === i);
          let isSelected = i === selectedRectIndex;

          ctx.fillStyle = isSelected
            ? "rgba(156, 39, 176, 0.4)"
            : isHovered
              ? "rgba(156, 39, 176, 0.3)"
              : "rgba(156, 39, 176, 0.2)"; // Purple transparent
          ctx.fillRect(rx, ry, rw, rh);

          ctx.strokeStyle = isSelected
            ? "rgba(255, 64, 129, 1)"
            : isHovered
              ? "rgba(216, 27, 96, 0.9)"
              : "rgba(156, 39, 176, 0.8)"; // Solid border
          ctx.lineWidth = isSelected || isHovered ? 2 : 1;
          ctx.strokeRect(rx, ry, rw, rh);

          // Draw resize handles (corners) if hovered or selected
          if ((isHovered || isSelected) && !rectCreateState.active) {
            ctx.fillStyle = "#C3C6CE"; // Light handle color
            ctx.strokeStyle = "#0B0B0E";
            ctx.lineWidth = 1;
            let hs = 6; // handle size

            let corners = [
              { cx: rx, cy: ry }, // NW
              { cx: rx + rw, cy: ry }, // NE
              { cx: rx, cy: ry + rh }, // SW
              { cx: rx + rw, cy: ry + rh }, // SE
            ];

            for (let corner of corners) {
              ctx.fillRect(corner.cx - hs / 2, corner.cy - hs / 2, hs, hs);
              ctx.strokeRect(corner.cx - hs / 2, corner.cy - hs / 2, hs, hs);
            }
          }
        }
      }
      // Pass 3: Draw Measure Tool
      if (
        measureState.step > 0 &&
        measureState.startIdx !== null &&
        measureState.endIdx !== null &&
        globalBars &&
        globalBars.length
      ) {
        let chronoStartIdx = Math.min(
          measureState.startIdx,
          measureState.endIdx,
        );
        let chronoEndIdx = Math.max(
          measureState.startIdx,
          measureState.endIdx,
        );
        chronoStartIdx = Math.max(
          0,
          Math.min(globalBars.length - 1, chronoStartIdx),
        );
        chronoEndIdx = Math.max(
          0,
          Math.min(globalBars.length - 1, chronoEndIdx),
        );

        let entryBar = globalBars[chronoStartIdx];
        let exitBar = globalBars[chronoEndIdx];
        let side = exitBar.close >= entryBar.close ? "LONG" : "SHORT";

        let entryPrice = entryBar.close;
        let exitPrice = exitBar.close;

        let margin = 100;
        let leverage = 20;
        let maxPnl = 0;
        let pnl = 0;

        if (side === "LONG") {
          pnl = margin * leverage * ((exitPrice - entryPrice) / entryPrice);
          let highest = -Infinity;
          for (let i = chronoStartIdx; i <= chronoEndIdx; i++)
            highest = Math.max(highest, globalBars[i].high);
          maxPnl = margin * leverage * ((highest - entryPrice) / entryPrice);
        } else {
          pnl = margin * leverage * ((entryPrice - exitPrice) / entryPrice);
          let lowest = Infinity;
          for (let i = chronoStartIdx; i <= chronoEndIdx; i++)
            lowest = Math.min(lowest, globalBars[i].low);
          maxPnl = margin * leverage * ((entryPrice - lowest) / entryPrice);
        }

        let barsCount = chronoEndIdx - chronoStartIdx;
        let timeDiffSec = exitBar.time - entryBar.time;
        let days = Math.floor(timeDiffSec / 86400);
        let hours = Math.floor((timeDiffSec % 86400) / 3600);
        let mins = Math.floor((timeDiffSec % 3600) / 60);
        let timeStr = "";
        if (days > 0) timeStr += days + "d ";
        if (hours > 0) timeStr += hours + "h ";
        timeStr += mins + "m";

        let x1 = timeScale.logicalToCoordinate(chronoStartIdx);
        let x2 = timeScale.logicalToCoordinate(chronoEndIdx);
        let y1 = candleSeries.priceToCoordinate(entryPrice);
        let y2 = candleSeries.priceToCoordinate(exitPrice);

        if (x1 !== null && x2 !== null && y1 !== null && y2 !== null) {
          ctx.save();

          let fillCol =
            side === "LONG"
              ? "rgba(0, 230, 118, 0.2)"
              : "rgba(255, 82, 82, 0.2)";
          let strokeCol =
            side === "LONG"
              ? "rgba(0, 230, 118, 0.8)"
              : "rgba(255, 82, 82, 0.8)";

          ctx.fillStyle = fillCol;
          let rectX = Math.min(x1, x2);
          let rectW = Math.abs(x2 - x1);
          if (rectW < 1) rectW = 1; // Ensure visible line even if 0 bars
          let rectY = Math.min(y1, y2);
          let rectH = Math.abs(y2 - y1);

          ctx.fillRect(rectX, rectY, rectW, rectH);
          ctx.strokeStyle = strokeCol;
          ctx.lineWidth = 1;
          ctx.strokeRect(rectX, rectY, rectW, rectH);

          // Box position logic
          let boxWidth = 200;
          let boxHeight = 165;
          let boxX = Math.max(x1, x2) + 15;
          let boxY = y2 - boxHeight / 2;
          if (boxX + boxWidth > canvas.width) {
            boxX = Math.min(x1, x2) - boxWidth - 15;
          }
          if (boxY < 10) boxY = 10;
          if (boxY + boxHeight > canvas.height - 10)
            boxY = canvas.height - boxHeight - 10;

          ctx.fillStyle = "rgba(17, 17, 24, 0.95)";
          ctx.shadowColor = "rgba(0,0,0,0.5)";
          ctx.shadowBlur = 10;
          if (ctx.roundRect) {
            ctx.beginPath();
            ctx.roundRect(boxX, boxY, boxWidth, boxHeight, 8);
            ctx.fill();
            ctx.shadowBlur = 0;
            ctx.strokeStyle = "#1f2933";
            ctx.stroke();
          } else {
            ctx.fillRect(boxX, boxY, boxWidth, boxHeight);
            ctx.shadowBlur = 0;
            ctx.strokeStyle = "#1f2933";
            ctx.strokeRect(boxX, boxY, boxWidth, boxHeight);
          }

          ctx.fillStyle = "#C3C6CE";
          ctx.font =
            '13px -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif';
          ctx.textAlign = "left";
          ctx.textBaseline = "top";
          let textX = boxX + 12;
          let textY = boxY + 12;
          let lineH = 20;

          ctx.fillStyle = side === "LONG" ? "#00E676" : "#FF5252";
          ctx.fillText(`Side: ${side} (100u x20)`, textX, textY);
          textY += lineH;
          ctx.fillStyle = "#C3C6CE";
          ctx.fillText(`Entry: ${entryPrice.toFixed(4)}`, textX, textY);
          textY += lineH;
          ctx.fillText(`Exit:  ${exitPrice.toFixed(4)}`, textX, textY);
          textY += lineH;

          let maxRoe = (maxPnl / margin) * 100;
          let roe = (pnl / margin) * 100;

          ctx.fillStyle = maxPnl >= 0 ? "#00E676" : "#FF5252";
          ctx.fillText(
            `Max PnL: ${maxPnl > 0 ? "+" : ""}${maxPnl.toFixed(2)} USDT (${maxRoe > 0 ? "+" : ""}${maxRoe.toFixed(2)}%)`,
            textX,
            textY,
          );
          textY += lineH;

          ctx.fillStyle = pnl >= 0 ? "#00E676" : "#FF5252";
          ctx.fillText(
            `PnL: ${pnl > 0 ? "+" : ""}${pnl.toFixed(2)} USDT (${roe > 0 ? "+" : ""}${roe.toFixed(2)}%)`,
            textX,
            textY,
          );
          textY += lineH;

          ctx.fillStyle = "#C3C6CE";
          ctx.fillText(`Time: ${timeStr}`, textX, textY);
          textY += lineH;
          ctx.fillText(`Bars: ${barsCount}`, textX, textY);

          ctx.restore();
        }
      }
    }

    // Helper: convert pointer event position to chart coordinates
    function ptrToChart(e) {
      const wrapper = document.getElementById("chart-wrapper");
      const b = wrapper.getBoundingClientRect();
      const x = e.clientX - b.left;
      const y = e.clientY - b.top;
      const logical = chart.timeScale().coordinateToLogical(x);
      const price = candleSeries.coordinateToPrice(y);
      return { x, y, logical, price };
    }

    function setupMeasureTool() {
      const wrapper = document.getElementById("chart-wrapper");

      // Is this likely a touch/pen device?
      const isTouch = () => window.matchMedia("(pointer: coarse)").matches;
      // Touch slop: larger hit area on touch
      const handleSlop = () => isTouch() ? 28 : 10;

      // ─── Pointer state ────────────────────────────────────────────────
      let activePointerId = null;  // We only track one pointer at a time

      // ─── Hit test ────────────────────────────────────────────────────
      function hitTestRects(logical, price) {
        const slop = handleSlop();
        const priceSlop = Math.abs(
          candleSeries.coordinateToPrice(0) - candleSeries.coordinateToPrice(slop)
        ) || 0.0001;

        for (let i = drawnRects.length - 1; i >= 0; i--) {
          const r = drawnRects[i];
          const minL = Math.min(r.l1, r.l2), maxL = Math.max(r.l1, r.l2);
          const minP = Math.min(r.p1, r.p2), maxP = Math.max(r.p1, r.p2);

          // corners (resize handles)
          if (Math.abs(logical - minL) <= slop / 4 && Math.abs(price - maxP) <= priceSlop) return { type: 'rect', idx: i, corner: 'nw' };
          if (Math.abs(logical - maxL) <= slop / 4 && Math.abs(price - maxP) <= priceSlop) return { type: 'rect', idx: i, corner: 'ne' };
          if (Math.abs(logical - minL) <= slop / 4 && Math.abs(price - minP) <= priceSlop) return { type: 'rect', idx: i, corner: 'sw' };
          if (Math.abs(logical - maxL) <= slop / 4 && Math.abs(price - minP) <= priceSlop) return { type: 'rect', idx: i, corner: 'se' };
          // interior
          if (logical >= minL && logical <= maxL && price >= minP && price <= maxP)
            return { type: 'rect', idx: i, corner: 'move' };
        }
        for (let i = drawnVpRects.length - 1; i >= 0; i--) {
          const v = drawnVpRects[i];
          const minL = Math.min(v.l1, v.l2), maxL = Math.max(v.l1, v.l2);
          if (Math.abs(logical - minL) <= slop / 4) return { type: 'vp', idx: i, corner: 'w' };
          if (Math.abs(logical - maxL) <= slop / 4) return { type: 'vp', idx: i, corner: 'e' };
          if (logical >= minL && logical <= maxL) return { type: 'vp', idx: i, corner: 'move' };
        }
        return null;
      }

      // ─── Pointer DOWN ────────────────────────────────────────────────
      wrapper.addEventListener("pointerdown", (e) => {
        // Only primary pointer (ignore multi-touch)
        if (!e.isPrimary) return;
        if (e.button !== 0 && e.pointerType === "mouse") return;

        activePointerId = e.pointerId;
        wrapper.setPointerCapture(e.pointerId); // keeps events even if finger slides off

        const { logical, price } = ptrToChart(e);
        if (logical === null || price === null) return;

        // ─ Measure mode ─
        if (measureState.modeActive) {
          if (measureState.step === 0) {
            measureState.startIdx = Math.round(logical);
            measureState.endIdx = measureState.startIdx;
            measureState.step = 1;
          } else if (measureState.step === 1) {
            measureState.endIdx = Math.round(logical);
            measureState.step = 2;
            wrapper.style.cursor = "default";
          } else if (measureState.step === 2) {
            setDrawMode("cursor");
          }
          requestAnimationFrame(drawOverlay);
          return;
        }

        // ─ Draw Rect mode ─
        if (drawingModeActive) {
          rectCreateState.active = true;
          rectCreateState.logical1 = logical;
          rectCreateState.price1 = price;
          rectCreateState.logical2 = logical;
          rectCreateState.price2 = price;
          requestAnimationFrame(drawOverlay);
          return;
        }

        // ─ Draw VP mode ─
        if (drawingVPModeActive) {
          vpCreateState.active = true;
          vpCreateState.logical1 = logical;
          vpCreateState.logical2 = logical;
          requestAnimationFrame(drawOverlay);
          return;
        }

        // ─ Select / Drag existing ─
        const hit = hitTestRects(logical, price);
        if (hit) {
          chart.applyOptions({ handleScroll: false });
          if (hit.type === 'rect') {
            selectedRectIndex = hit.idx; selectedVpIndex = -1;
            const r = drawnRects[hit.idx];
            rectDragState.active = true; rectDragState.isVp = false;
            rectDragState.mode = hit.corner; rectDragState.index = hit.idx;
            rectDragState.startLogical = logical; rectDragState.startPrice = price;
            rectDragState.originalLogical1 = r.l1; rectDragState.originalLogical2 = r.l2;
            rectDragState.originalPrice1 = r.p1; rectDragState.originalPrice2 = r.p2;
          } else {
            selectedVpIndex = hit.idx; selectedRectIndex = -1;
            const v = drawnVpRects[hit.idx];
            rectDragState.active = true; rectDragState.isVp = true;
            rectDragState.mode = hit.corner; rectDragState.index = hit.idx;
            rectDragState.startLogical = logical;
            rectDragState.originalLogical1 = v.l1; rectDragState.originalLogical2 = v.l2;
          }
          requestAnimationFrame(drawOverlay);
        } else {
          // Deselect
          if (selectedRectIndex !== -1 || selectedVpIndex !== -1) {
            selectedRectIndex = -1; selectedVpIndex = -1;
            requestAnimationFrame(drawOverlay);
          }
        }
      });

      // ─── Pointer MOVE ────────────────────────────────────────────────
      wrapper.addEventListener("pointermove", (e) => {
        if (!e.isPrimary) return;
        const { logical, price, x, y } = ptrToChart(e);
        if (logical === null || price === null) return;

        // Update crosshair logical for measure tool preview
        lastCrosshairLogical = logical;

        // Drawing rect
        if (drawingModeActive && rectCreateState.active) {
          rectCreateState.logical2 = logical;
          rectCreateState.price2 = price;
          requestAnimationFrame(drawOverlay);
          return;
        }

        // Drawing VP
        if (drawingVPModeActive && vpCreateState.active) {
          vpCreateState.logical2 = logical;
          requestAnimationFrame(drawOverlay);
          return;
        }

        // Measure step 1 preview
        if (measureState.modeActive && measureState.step === 1) {
          measureState.endIdx = Math.round(logical);
          requestAnimationFrame(drawOverlay);
          return;
        }

        // Dragging existing
        if (rectDragState.active) {
          const logicalDelta = logical - rectDragState.startLogical;
          const { originalLogical1: ol1, originalLogical2: ol2 } = rectDragState;
          const minL = Math.min(ol1, ol2), maxL = Math.max(ol1, ol2);

          if (rectDragState.isVp) {
            const v = drawnVpRects[rectDragState.index];
            if (rectDragState.mode === 'move') { v.l1 = ol1 + logicalDelta; v.l2 = ol2 + logicalDelta; }
            else if (rectDragState.mode === 'w') { v.l1 = ol1 === minL ? ol1 + logicalDelta : ol1; v.l2 = ol2 === minL ? ol2 + logicalDelta : ol2; }
            else if (rectDragState.mode === 'e') { v.l1 = ol1 === maxL ? ol1 + logicalDelta : ol1; v.l2 = ol2 === maxL ? ol2 + logicalDelta : ol2; }
          } else {
            const priceDelta = price - rectDragState.startPrice;
            const rect = drawnRects[rectDragState.index];
            const { originalPrice1: op1, originalPrice2: op2 } = rectDragState;
            const minP = Math.min(op1, op2), maxP = Math.max(op1, op2);
            if (rectDragState.mode === 'move') { rect.l1 = ol1 + logicalDelta; rect.l2 = ol2 + logicalDelta; rect.p1 = op1 + priceDelta; rect.p2 = op2 + priceDelta; }
            else if (rectDragState.mode === 'nw') { rect.l1 = ol1 === minL ? ol1 + logicalDelta : ol1; rect.l2 = ol2 === minL ? ol2 + logicalDelta : ol2; rect.p1 = op1 === maxP ? op1 + priceDelta : op1; rect.p2 = op2 === maxP ? op2 + priceDelta : op2; }
            else if (rectDragState.mode === 'ne') { rect.l1 = ol1 === maxL ? ol1 + logicalDelta : ol1; rect.l2 = ol2 === maxL ? ol2 + logicalDelta : ol2; rect.p1 = op1 === maxP ? op1 + priceDelta : op1; rect.p2 = op2 === maxP ? op2 + priceDelta : op2; }
            else if (rectDragState.mode === 'sw') { rect.l1 = ol1 === minL ? ol1 + logicalDelta : ol1; rect.l2 = ol2 === minL ? ol2 + logicalDelta : ol2; rect.p1 = op1 === minP ? op1 + priceDelta : op1; rect.p2 = op2 === minP ? op2 + priceDelta : op2; }
            else if (rectDragState.mode === 'se') { rect.l1 = ol1 === maxL ? ol1 + logicalDelta : ol1; rect.l2 = ol2 === maxL ? ol2 + logicalDelta : ol2; rect.p1 = op1 === minP ? op1 + priceDelta : op1; rect.p2 = op2 === minP ? op2 + priceDelta : op2; }
          }
          requestAnimationFrame(drawOverlay);
          return;
        }

        // Mouse hover cursor: only on non-touch
        if (!isTouch() && !drawingModeActive && !drawingVPModeActive && !measureState.modeActive) {
          const hit = hitTestRects(logical, price);
          hoveredRectIndex = -1; hoveredVpIndex = -1; hoveredCorner = "";
          if (hit) {
            if (hit.type === 'rect') { hoveredRectIndex = hit.idx; hoveredCorner = hit.corner; }
            else { hoveredVpIndex = hit.idx; hoveredCorner = hit.corner; }
            const cur = hit.corner === 'move' ? 'move'
              : (hit.corner === 'nw' || hit.corner === 'se') ? 'nwse-resize'
                : (hit.corner === 'ne' || hit.corner === 'sw') ? 'nesw-resize' : 'ew-resize';
            wrapper.style.cursor = cur;
          } else {
            wrapper.style.cursor = drawingModeActive || drawingVPModeActive ? 'crosshair' : 'default';
          }
          requestAnimationFrame(drawOverlay);
        }
      }, true);

      // ─── Pointer UP ──────────────────────────────────────────────────
      window.addEventListener("pointerup", (e) => {
        if (!e.isPrimary) return;
        activePointerId = null;

        // Finish rect drawing
        if (rectCreateState.active) {
          rectCreateState.active = false;
          if (Math.abs(rectCreateState.logical1 - rectCreateState.logical2) > 0.5 &&
            Math.abs(rectCreateState.price1 - rectCreateState.price2) > 0) {
            drawnRects.push({
              l1: rectCreateState.logical1, p1: rectCreateState.price1,
              l2: rectCreateState.logical2, p2: rectCreateState.price2
            });
            localStorage.setItem("stat1_drawnRects", JSON.stringify(drawnRects));
          }
          rectCreateState.logical1 = rectCreateState.price1 = rectCreateState.logical2 = rectCreateState.price2 = null;
          // Stay in draw mode — ready for next rectangle (like TradingView)
          // setDrawMode("cursor") only if Escape pressed
          requestAnimationFrame(drawOverlay);
        }

        // Finish VP drawing
        if (vpCreateState.active) {
          vpCreateState.active = false;
          if (Math.abs(vpCreateState.logical1 - vpCreateState.logical2) > 0.5) {
            drawnVpRects.push({ l1: vpCreateState.logical1, l2: vpCreateState.logical2 });
            localStorage.setItem("stat1_drawnVpRects", JSON.stringify(drawnVpRects));
          }
          vpCreateState.logical1 = vpCreateState.logical2 = null;
          // Stay in VP draw mode for next zone
          requestAnimationFrame(drawOverlay);
        }

        // Finish drag
        if (rectDragState.active) {
          rectDragState.active = false;
          if (rectDragState.isVp)
            localStorage.setItem("stat1_drawnVpRects", JSON.stringify(drawnVpRects));
          else
            localStorage.setItem("stat1_drawnRects", JSON.stringify(drawnRects));
          chart.applyOptions({ handleScroll: { mouseWheel: true, pressedMouseMove: true, horzTouchDrag: true, vertTouchDrag: true } });
          requestAnimationFrame(drawOverlay);
        }
      }, true);

      // ─── Keyboard ────────────────────────────────────────────────────
      window.addEventListener("keydown", (e) => {
        if ((e.key === "Delete" || e.key === "Backspace") && !rectCreateState.active && !vpCreateState.active) {
          if (selectedRectIndex !== -1) { drawnRects.splice(selectedRectIndex, 1); selectedRectIndex = -1; hoveredRectIndex = -1; localStorage.setItem("stat1_drawnRects", JSON.stringify(drawnRects)); }
          else if (selectedVpIndex !== -1) { drawnVpRects.splice(selectedVpIndex, 1); selectedVpIndex = -1; hoveredVpIndex = -1; localStorage.setItem("stat1_drawnVpRects", JSON.stringify(drawnVpRects)); }
          else if (hoveredRectIndex !== -1) { drawnRects.splice(hoveredRectIndex, 1); hoveredRectIndex = -1; localStorage.setItem("stat1_drawnRects", JSON.stringify(drawnRects)); }
          else if (hoveredVpIndex !== -1) { drawnVpRects.splice(hoveredVpIndex, 1); hoveredVpIndex = -1; localStorage.setItem("stat1_drawnVpRects", JSON.stringify(drawnVpRects)); }
          wrapper.style.cursor = "default";
          requestAnimationFrame(drawOverlay);
        }
      });

      // ─── Right click (desktop delete) ────────────────────────────────
      wrapper.addEventListener("contextmenu", (e) => {
        e.preventDefault();
        if (measureState.modeActive) { setDrawMode("cursor"); return; }
        if (drawingModeActive || drawingVPModeActive) { setDrawMode("cursor"); return; }
        const { logical, price } = ptrToChart(e);
        if (logical === null || price === null) return;
        const hit = hitTestRects(logical, price);
        if (hit) {
          if (hit.type === 'rect') { drawnRects.splice(hit.idx, 1); if (selectedRectIndex === hit.idx) selectedRectIndex = -1; else if (selectedRectIndex > hit.idx) selectedRectIndex--; localStorage.setItem("stat1_drawnRects", JSON.stringify(drawnRects)); }
          else { drawnVpRects.splice(hit.idx, 1); if (selectedVpIndex === hit.idx) selectedVpIndex = -1; else if (selectedVpIndex > hit.idx) selectedVpIndex--; localStorage.setItem("stat1_drawnVpRects", JSON.stringify(drawnVpRects)); }
          requestAnimationFrame(drawOverlay);
        }
      });

      // ─── Crosshair for measure preview ───────────────────────────────
      chart.subscribeCrosshairMove((param) => {
        if (param.logical !== undefined && param.logical !== null) {
          lastCrosshairLogical = param.logical;
          if (measureState.modeActive && measureState.step === 1) {
            measureState.endIdx = Math.round(param.logical);
            requestAnimationFrame(drawOverlay);
          }
        } else {
          lastCrosshairLogical = null;
        }
      });

      // ─── Keyboard Shift to activate measure ──────────────────────────
      window.addEventListener("keydown", (e) => {
        if ((e.key === "Shift" || e.key === "ShiftLeft" || e.key === "ShiftRight") && !measureState.modeActive) {
          setDrawMode("measure");
        }
      });
    }

    function setupToggles() {
      const tAtr1 = document.getElementById("toggle-atr1");
      const tAtr2 = document.getElementById("toggle-atr2");
      const tVsr = document.getElementById("toggle-vsr");
      const tVpVol = document.getElementById("toggle-vpvol");
      const tVwap = document.getElementById("toggle-vwap");
      const tDrawVP = document.getElementById("toggle-draw-vp");
      const tDrawRect = document.getElementById("toggle-draw-rect");

      tAtr1.checked = showATR1;
      tAtr2.checked = showATR2;
      tVsr.checked = showVSR;
      tVpVol.checked = showVPVol;
      tVwap.checked = showVWAP;
      tDrawVP.checked = drawingVPModeActive;
      tDrawRect.checked = drawingModeActive;

      tAtr1.addEventListener("change", (e) => {
        showATR1 = e.target.checked;
        localStorage.setItem("stat1_showATR1", showATR1 ? "1" : "0");
        requestAnimationFrame(drawOverlay);
      });
      tAtr2.addEventListener("change", (e) => {
        showATR2 = e.target.checked;
        localStorage.setItem("stat1_showATR2", showATR2 ? "1" : "0");
        t1Series2.applyOptions({ visible: showATR2 });
        t2Series2.applyOptions({ visible: showATR2 });
      });
      tVsr.addEventListener("change", (e) => {
        showVSR = e.target.checked;
        localStorage.setItem("stat1_showVSR", showVSR ? "1" : "0");
        requestAnimationFrame(drawOverlay);
      });
      tVpVol.addEventListener("change", (e) => {
        showVPVol = e.target.checked;
        localStorage.setItem("stat1_showVPVol", showVPVol ? "1" : "0");
        requestAnimationFrame(drawOverlay);
      });
      tVwap.addEventListener("change", (e) => {
        showVWAP = e.target.checked;
        localStorage.setItem("stat1_showVWAP", showVWAP ? "1" : "0");
        vwapSeries.applyOptions({ visible: showVWAP });
      });

      tDrawVP.addEventListener("change", (e) => {
        drawingVPModeActive = e.target.checked;
        if (drawingVPModeActive && drawingModeActive) {
          drawingModeActive = false;
          tDrawRect.checked = false;
        }
        chart.applyOptions({ handleScroll: !drawingVPModeActive });
        syncSidebarFromState();
      });

      tDrawRect.addEventListener("change", (e) => {
        drawingModeActive = e.target.checked;
        if (drawingModeActive && drawingVPModeActive) {
          drawingVPModeActive = false;
          tDrawVP.checked = false;
        }
        chart.applyOptions({ handleScroll: !drawingModeActive });
        syncSidebarFromState();
      });
    }

    // =============================================
    // LOADING SCREEN
    // =============================================
    function setLoadingText(msg) {
      const el = document.getElementById("loading-text");
      if (el) el.textContent = msg;
    }

    function hideLoadingScreen() {
      const screen = document.getElementById("loading-screen");
      if (screen) screen.classList.add("hidden");
    }

    // =============================================
    // LEFT SIDEBAR — Drawing Tool Controller
    // =============================================
    function syncSidebarFromState() {
      const sbCursor = document.getElementById("sb-cursor");
      const sbRect = document.getElementById("sb-rect");
      const sbVp = document.getElementById("sb-vp");
      const sbMeasure = document.getElementById("sb-measure");
      const hintEl = document.getElementById("draw-hint");

      [sbCursor, sbRect, sbVp, sbMeasure].forEach(b => {
        if (b) b.classList.remove("active");
      });

      let hintMsg = "";
      if (drawingModeActive) {
        sbRect.classList.add("active");
        hintMsg = "Tap and drag to draw a rectangle";
      } else if (drawingVPModeActive) {
        sbVp.classList.add("active");
        hintMsg = "Tap and drag to draw a Volume Profile zone";
      } else if (measureState.modeActive) {
        sbMeasure.classList.add("active");
        hintMsg = "Tap entry point, then tap exit point";
      } else {
        sbCursor.classList.add("active");
      }

      if (hintEl) {
        hintEl.textContent = hintMsg;
        hintEl.classList.toggle("visible", hintMsg !== "");
        if (hintMsg) {
          clearTimeout(window._hintTimer);
          window._hintTimer = setTimeout(() => hintEl.classList.remove("visible"), 4000);
        }
      }
    }

    function setDrawMode(mode) {
      // mode: "cursor" | "rect" | "vp" | "measure"
      drawingModeActive = false;
      drawingVPModeActive = false;
      measureState.modeActive = false;
      measureState.step = 0;
      measureState.startIdx = null;
      measureState.endIdx = null;

      const tDrawVP = document.getElementById("toggle-draw-vp");
      const tDrawRect = document.getElementById("toggle-draw-rect");
      if (tDrawVP) tDrawVP.checked = false;
      if (tDrawRect) tDrawRect.checked = false;

      const wrapper = document.getElementById("chart-wrapper");
      if (wrapper) wrapper.style.cursor = "default";

      if (mode === "rect") {
        drawingModeActive = true;
        if (tDrawRect) tDrawRect.checked = true;
        chart.applyOptions({ handleScroll: false });
      } else if (mode === "vp") {
        drawingVPModeActive = true;
        if (tDrawVP) tDrawVP.checked = true;
        chart.applyOptions({ handleScroll: false });
      } else if (mode === "measure") {
        measureState.modeActive = true;
        chart.applyOptions({ handleScroll: true });
        if (wrapper) wrapper.style.cursor = "crosshair";
      } else {
        // cursor
        chart.applyOptions({ handleScroll: true });
      }

      requestAnimationFrame(drawOverlay);
      syncSidebarFromState();
    }

    function setupSidebar() {
      const sbCursor = document.getElementById("sb-cursor");
      const sbRect = document.getElementById("sb-rect");
      const sbVp = document.getElementById("sb-vp");
      const sbMeasure = document.getElementById("sb-measure");
      const sbDelete = document.getElementById("sb-delete");

      sbCursor.addEventListener("click", () => setDrawMode("cursor"));
      sbRect.addEventListener("click", () => {
        if (drawingModeActive) setDrawMode("cursor");
        else setDrawMode("rect");
      });
      sbVp.addEventListener("click", () => {
        if (drawingVPModeActive) setDrawMode("cursor");
        else setDrawMode("vp");
      });
      sbMeasure.addEventListener("click", () => {
        if (measureState.modeActive) setDrawMode("cursor");
        else setDrawMode("measure");
      });
      sbDelete.addEventListener("click", () => {
        // Delete selected, hovered, or last drawn shape
        if (selectedRectIndex !== -1) {
          drawnRects.splice(selectedRectIndex, 1);
          selectedRectIndex = -1; hoveredRectIndex = -1;
          localStorage.setItem("stat1_drawnRects", JSON.stringify(drawnRects));
        } else if (selectedVpIndex !== -1) {
          drawnVpRects.splice(selectedVpIndex, 1);
          selectedVpIndex = -1; hoveredVpIndex = -1;
          localStorage.setItem("stat1_drawnVpRects", JSON.stringify(drawnVpRects));
        } else if (hoveredRectIndex !== -1) {
          drawnRects.splice(hoveredRectIndex, 1);
          hoveredRectIndex = -1;
          localStorage.setItem("stat1_drawnRects", JSON.stringify(drawnRects));
        } else if (hoveredVpIndex !== -1) {
          drawnVpRects.splice(hoveredVpIndex, 1);
          hoveredVpIndex = -1;
          localStorage.setItem("stat1_drawnVpRects", JSON.stringify(drawnVpRects));
        }
        requestAnimationFrame(drawOverlay);
      });

      // Keyboard shortcut Escape returns to cursor
      window.addEventListener("keydown", e => {
        if (e.key === "Escape" && e.target.tagName !== "INPUT") {
          setDrawMode("cursor");
        }
      });
    }

    // Load data for current SYMBOL+INTERVAL into chart (can be called multiple times)
    async function loadSymbol() {
      if (!SYMBOL) return;
      setLoadingText(`Loading ${SYMBOL} ${INTERVAL}...`);
      const bars = await fetchBinanceData();

      if (bars.length === 0) {
        setStatus("error", `Failed to load ${SYMBOL}`);
        return;
      }

      candleSeries.setData(bars);
      globalBars = bars;

      applyPriceFormat(bars);

      globalCycles = [];
      globalVsrZones = [];
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      calculateBVCVolumes(bars, 20);

      const vwapData = calculateStandardVWAP(globalBars);
      vwapSeries.setData(vwapData);

      const bot1 = calculateATRBot(bars, ATR_LENGTH, EMA_LENGTH, ATR_MULT);
      globalCycles = bot1.cycles;

      const bot2 = calculateATRBot(bars, 10, 14, 1.0);
      globalVsrZones = calculateVSR(bars, VSR_LENGTH, VSR_THRESHOLD);

      t1Series.setData(bot1.t1Data);
      t2Series.setData(bot1.t2Data);
      t1Series2.setData(bot2.t1Data);
      t2Series2.setData(bot2.t2Data);

      setStatus("ready", `${bars.length.toLocaleString()} bars`);
      chart.timeScale().scrollToRealTime();
      requestAnimationFrame(() => syncCanvasSize());
    }

    async function run() {
      initChart();
      setupToggles();
      setupSettingsPanel();
      setupIntervalPills();
      setupCacheManager();

      setupSidebar();

      initResizeObserver();
      setTimeout(() => syncCanvasSize(), 300);
      setupMeasureTool();

      // Show loading screen until first data is ready
      setLoadingText("Fetching exchange info...");
      allSymbols = await fetchExchangeInfo();
      setupSymbolSearch();

      const startSym = getStartSymbol();
      SYMBOL = startSym;
      document.getElementById("symbol-input").value = startSym;
      setLoadingText(`Loading ${startSym}...`);
      setStatus("loading", `Loading ${startSym}...`);
      await loadSymbol();
      hideLoadingScreen();
      setupTickerWS(startSym);
      syncSidebarFromState();
    }

    run();

    // =============================================
    // PREVENT BROWSER-LEVEL ZOOM ON TABLET / TOUCH
    // Lightweight-charts handles pinch zoom internally;
    // we must stop the browser from intercepting it.
    // =============================================
    // =============================================
    // PWA — Register Service Worker (network-only)
    // =============================================
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js')
        .then(reg => console.log('[SW] Registered:', reg.scope))
        .catch(err => console.warn('[SW] Registration failed:', err));
    }

    (function blockBrowserZoom() {
      const wrapper = document.getElementById('chart-wrapper');

      // Block Safari's gesture events (iOS / iPadOS)
      wrapper.addEventListener('gesturestart', e => e.preventDefault(), { passive: false });
      wrapper.addEventListener('gesturechange', e => e.preventDefault(), { passive: false });
      wrapper.addEventListener('gestureend', e => e.preventDefault(), { passive: false });

      // Block ctrl+wheel (desktop) and two-finger-scroll-zoom (trackpad / tablet)
      wrapper.addEventListener('wheel', e => {
        if (e.ctrlKey || e.metaKey) e.preventDefault();
      }, { passive: false });

      // Prevent double-tap zoom on the entire page
      document.addEventListener('touchstart', e => {
        if (e.touches.length > 1) e.preventDefault();
      }, { passive: false });

      // Block pinch on the chart wrapper specifically
      wrapper.addEventListener('touchstart', e => {
        if (e.touches.length > 1) e.preventDefault();
      }, { passive: false });

      wrapper.addEventListener('touchmove', e => {
        if (e.touches.length > 1) e.preventDefault();
      }, { passive: false });
    })();
  </script>
